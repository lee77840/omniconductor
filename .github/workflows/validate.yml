name: validate

# CONDUCTOR CI — framework purity + per-adapter install/validate + CLI sanity.
# Dependency-light: only bash + node (both pre-installed on ubuntu-latest).
# The CLI is dependency-free, so no `npm install` step is required.

# Manual release gate only. Routine pushes and pull requests are verified by the
# local release command and must not consume GitHub Actions minutes.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Framework purity — no reference-adopter-specific tokens in framework body.
  # ---------------------------------------------------------------------------
  purity:
    name: framework purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run purity check
        run: bash tools/check-framework-purity.sh

  # ---------------------------------------------------------------------------
  # 1b. Stale tokens + version stamps — living docs must not contradict shipped
  #     reality (ADR-039). Data-driven from tools/stale-tokens.txt.
  # ---------------------------------------------------------------------------
  stale-tokens:
    name: stale tokens + version stamps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run stale-token check
        run: bash tools/check-stale-tokens.sh

  # ---------------------------------------------------------------------------
  # 1c. Adapter metadata — adapters/<tool>/metadata.json is the single source
  #     for enumerable adapter facts; assert transform.sh + validator agree (ADR-040).
  # ---------------------------------------------------------------------------
  adapter-metadata:
    name: adapter metadata consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run metadata consistency check
        run: bash tools/check-adapter-metadata.sh
      - name: Generated doc regions match metadata (ADR-042)
        run: node tools/generate-adapter-docs.js --check

  # ---------------------------------------------------------------------------
  # 2. Per-adapter install + validate (matrix over the 6 supported tools).
  #    Installs into a fresh temp dir with representative recipes, then runs
  #    the structural validator. Both steps fail the build on non-zero exit.
  # ---------------------------------------------------------------------------
  adapters:
    name: adapter ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [claude, cursor, copilot, gemini, codex, windsurf]
    steps:
      - uses: actions/checkout@v4
      - name: Install adapter into fresh temp dir
        run: |
          rm -rf "/tmp/ci-${{ matrix.tool }}"
          mkdir -p "/tmp/ci-${{ matrix.tool }}"
          node bin/omniconductor.js init \
            --target="${{ matrix.tool }}" "/tmp/ci-${{ matrix.tool }}" \
            --no-prompt \
            --accept-model-defaults \
            --recipes=tdd,debugging,self-improvement,git-hygiene,loop-engineering
      - name: Validate adapter output
        run: |
          bash tools/validate-adapter-output.sh \
            "/tmp/ci-${{ matrix.tool }}" \
            "${{ matrix.tool }}"
      - name: Doctor passes on a fresh install (ADR-041)
        run: |
          node bin/omniconductor.js doctor "/tmp/ci-${{ matrix.tool }}"
      - name: Doctor detects a broken install (negative)
        run: |
          t="/tmp/ci-${{ matrix.tool }}"
          first="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1]+'/.conductor/manifests/${{ matrix.tool }}.json','utf8')).emitted_files[0].path)" "$t")"
          mv "$t/$first" "$t/$first.hidden"
          if node bin/omniconductor.js doctor "$t" >/dev/null 2>&1; then
            echo "ERROR: doctor exited 0 on a broken install" >&2; exit 1
          fi
          mv "$t/$first.hidden" "$t/$first"
          node bin/omniconductor.js doctor "$t" >/dev/null
          echo "OK: doctor fails on breakage and recovers"
      - name: Self-improvement runtime is sane (hook script + hook config)
        run: |
          t="/tmp/ci-${{ matrix.tool }}"
          if [ -f "$t/.conductor/reflect/trajectory-log.sh" ]; then
            [ -x "$t/.conductor/reflect/trajectory-log.sh" ] || { echo "ERROR: trajectory-log.sh not executable" >&2; exit 1; }
          fi
          for f in "$t/.cursor/hooks.json" "$t/.codex/hooks.json" "$t/.windsurf/hooks.json" \
                   "$t/.github/hooks/conductor-reflect.json" "$t/.gemini/settings.json"; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" \
                || { echo "ERROR: $f is not valid JSON" >&2; exit 1; }
              echo "OK: $f parses as JSON"
            fi
          done
      - name: Git-hygiene hook emits (Claude only) + recipe body installs
        if: matrix.tool == 'claude'
        run: |
          t="/tmp/ci-${{ matrix.tool }}"
          [ -f "$t/.claude/rules/git-hygiene.md" ] || { echo "ERROR: git-hygiene recipe body missing" >&2; exit 1; }
          [ -x "$t/.claude/hooks/stop-git-hygiene-guard.sh" ] || { echo "ERROR: stop-git-hygiene-guard.sh missing or not executable" >&2; exit 1; }
          grep -q "stop-git-hygiene-guard" "$t/.claude/settings.json" || { echo "ERROR: hook not registered in settings.json" >&2; exit 1; }
          echo "OK: git-hygiene recipe + hook emitted and registered"
      - name: Loop-engineering hook emits (Claude only) + recipe body installs
        if: matrix.tool == 'claude'
        run: |
          t="/tmp/ci-${{ matrix.tool }}"
          [ -f "$t/.claude/rules/loop-engineering.md" ] || { echo "ERROR: loop-engineering recipe body missing" >&2; exit 1; }
          [ -x "$t/.claude/hooks/pretool-loop-guard.sh" ] || { echo "ERROR: pretool-loop-guard.sh missing or not executable" >&2; exit 1; }
          grep -q "pretool-loop-guard" "$t/.claude/settings.json" || { echo "ERROR: loop-guard not registered in settings.json" >&2; exit 1; }
          bash -n "$t/.claude/hooks/pretool-loop-guard.sh" || { echo "ERROR: loop-guard has a syntax error" >&2; exit 1; }
          echo "OK: loop-engineering recipe + hook emitted and registered"

  # ---------------------------------------------------------------------------
  # 2b. Install-mode presets (ADR-044) — full/minimal/strict/recipes-only/
  #     reflector-only behavior + marked-block round-trips per adapter.
  # ---------------------------------------------------------------------------
  install-modes:
    name: modes ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [claude, cursor, copilot, gemini, codex, windsurf]
    steps:
      - uses: actions/checkout@v4
      - name: Run mode test harness
        run: bash tools/test-install-modes.sh "${{ matrix.tool }}"

  # ---------------------------------------------------------------------------
  # 2c. Multi-tool coexistence + native runtime contracts (ADR-045).
  #     Run on GNU/Linux and macOS/BSD userlands to cover awk/sed portability.
  # ---------------------------------------------------------------------------
  multitool-runtime:
    name: multitool runtime (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run one-time model-routing state, safety, and concurrency fixtures
        run: npm run test:model-routing
      - name: Run managed-path and manifest-containment attack fixtures
        run: npm run test:path-safety
      - name: Run six-adapter coexistence and semantic doctor fixtures
        run: npm run test:multitool

  # ---------------------------------------------------------------------------
  # 3. CLI sanity — `list` reports all 6 adapters as implemented, and a
  #    --dry-run install writes 0 files.
  # ---------------------------------------------------------------------------
  cli:
    name: cli sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CLI list shows all 6 adapters implemented
        run: |
          out="$(node bin/omniconductor.js list)"
          echo "$out"
          for tool in claude cursor copilot gemini codex windsurf; do
            if ! printf '%s\n' "$out" | grep -E "^[[:space:]]*${tool}[[:space:]]" | grep -q "transform.sh"; then
              echo "ERROR: adapter '${tool}' not shown as implemented in CLI list output" >&2
              exit 1
            fi
          done
          echo "All 6 adapters reported as implemented."

      - name: Dry-run writes zero files
        run: |
          rm -rf /tmp/ci-dryrun
          mkdir -p /tmp/ci-dryrun
          node bin/omniconductor.js init --target=claude /tmp/ci-dryrun \
            --no-prompt --dry-run --recipes=tdd,debugging
          count="$(find /tmp/ci-dryrun -type f | wc -l | tr -d '[:space:]')"
          echo "Files written by --dry-run: ${count}"
          if [ "${count}" != "0" ]; then
            echo "ERROR: --dry-run wrote ${count} file(s); expected 0" >&2
            find /tmp/ci-dryrun -type f >&2
            exit 1
          fi
          echo "Dry-run wrote 0 files (as expected)."
